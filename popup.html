<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crumb Crusher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --green: #3aff6c;
      --green-dim: #1e8c3a;
      --red: #ff4444;
      --text: #e8e8e8;
      --text-muted: #666;
      --radius: 6px;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      user-select: none;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .logo-name {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-label {
      color: var(--text-muted);
      font-size: 10px;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--text-muted);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--green-dim);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(14px);
      background: var(--green);
    }

    .stats-row {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      color: var(--text-muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .current-site {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
    }

    .site-hostname {
      font-size: 11px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    .btn-small {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-small:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-small.active {
      border-color: var(--red);
      color: var(--red);
      background: rgba(255, 68, 68, 0.08);
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    .status-dot.off {
      background: var(--text-muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-text {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    .version {
      font-size: 9px;
      color: var(--border);
    }

    .disabled-overlay {
      display: none;
      position: absolute;
      inset: 48px 0 0;
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(2px);
      z-index: 10;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🍪</div>
      <span class="logo-name">Crumb Crusher</span>
    </div>
    <div class="toggle-wrapper">
      <span class="toggle-label" id="toggleLabel">ON</span>
      <label class="toggle" title="Enable/disable extension">
        <input type="checkbox" id="mainToggle" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="wrapper">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="pageCount">0</div>
        <div class="stat-label">This Page</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">All Time</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Current Site</div>
      <div class="current-site">
        <span class="site-hostname" id="hostname">—</span>
        <button class="btn-small" id="blockBtn" title="Block/unblock this site">Block</button>
      </div>
    </div>

    <div class="disabled-overlay" id="disabledOverlay">PAUSED</div>
  </div>

  <div class="footer">
    <span class="status-text">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Active</span>
    </span>
    <span class="version">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
